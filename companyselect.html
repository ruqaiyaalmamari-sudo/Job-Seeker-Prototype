<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اختيار الباحثين عن عمل المسجلين</title>
<style>
body { font-family: Arial; direction: rtl; margin:20px; background:#f4f6f8;}
h2 { text-align:center; margin-bottom:15px;}
table { width:100%; border-collapse: collapse; background:#fff; margin-bottom:10px;}
th,td { border:1px solid #ccc; padding:8px; text-align:center; font-size:13px;}
th { background:#e9ecef; }
button { padding:5px 10px; border:none; border-radius:4px; cursor:pointer; font-size:12px; margin:5px;}
button.select { background:#007bff; color:#fff;}
button.select:hover { background:#0056b3;}
.profile-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;}
.profile-content { background:#fff; padding:20px; border-radius:8px; width:400px; max-height:80%; overflow-y:auto; position:relative;}
.close-btn { position:absolute; top:10px; right:10px; cursor:pointer; background:#ff4d4d; color:#fff; border:none; padding:5px 10px; border-radius:4px;}
.profileName { cursor:pointer; color:#007bff; text-decoration:underline;}
</style>
</head>
<body>

<h2> اختيار الباحثين عن عمل المسجلين</h2>

<!-- جدول الباحثين -->
<table id="jobSeekerTable">
<thead>
<tr>
<th>✔</th>
<th>الرقم المدني</th>
<th>الاسم الكامل</th>
<th>التخصص</th>
<th>الجامعة</th>
<th>سنة التخرج</th>
<th>سنة التسجيل كباحث</th>
</tr>
</thead>
<tbody>
<tr>
<td><input type="checkbox" class="selectCheckbox"></td>
<td>123456789</td>
<td><a href="profileforcompany.html?id=1">أحمد محمد علي</a></td>

<td>علوم حاسب وشبكات</td>
<td>جامعة ظفار</td>
<td>2022</td>
<td>2023</td>
</tr>
<tr>
<td><input type="checkbox" class="selectCheckbox"></td>
<td>987654321</td>
<td><a href="profileforcompany.html?id=1">فاطمة سالم</a></td>

<td>هندسة اتصالات</td>
<td>جامعة السلطان قابوس</td>
<td>2021</td>
<td>2022</td>
</tr>
<tr>
<td><input type="checkbox" class="selectCheckbox"></td>
<td>112233445</td>
<td><a href="profileforcompany.html?id=1">سلمان عبدالله</a></td>
<td>شبكات</td>
<td>جامعة الكويت</td>
<td>2020</td>
<td>2021</td>
</tr>
</tbody>
</table>

<button class="select" onclick="selectCandidates()">اختيار الباحثين المحددين</button>

<!-- نافذة عرض Profile -->
<div class="profile-modal" id="profileModal">
  <div class="profile-content" id="profileContent">
    <button class="close-btn" onclick="closeProfile()">إغلاق</button>
    <div id="profileDetails"></div>
  </div>
</div>

<script>
// فتح نافذة Profile عند الضغط على اسم الباحث
document.querySelectorAll(".profileName").forEach(el=>{
  el.onclick = function(){
    const row = el.parentElement;
    const civilId = row.cells[1].innerText;
    const name = row.cells[2].innerText;
    const specialization = row.cells[3].innerText;
    const university = row.cells[4].innerText;
    const gradYear = row.cells[5].innerText;
    const regYear = row.cells[6].innerText;

    document.getElementById("profileDetails").innerHTML =
      `<h3>ملف الباحث</h3>
      <p><b>الرقم المدني:</b> ${civilId}</p>
      <p><b>الاسم الكامل:</b> ${name}</p>
      <p><b>التخصص:</b> ${specialization}</p>
      <p><b>الجامعة:</b> ${university}</p>
      <p><b>سنة التخرج:</b> ${gradYear}</p>
      <p><b>سنة التسجيل كباحث:</b> ${regYear}</p>`;
    
    document.getElementById("profileModal").style.display="flex";
  }
});

// إغلاق نافذة Profile
function closeProfile(){
  document.getElementById("profileModal").style.display="none";
}

// اختيار الباحثين المحددين
function selectCandidates(){
  const selected = [];
  document.querySelectorAll(".selectCheckbox").forEach((cb,index)=>{
    if(cb.checked){
      const row = cb.parentElement.parentElement;
      const name = row.cells[2].innerText;
      selected.push(name);
    }
  });

  if(selected.length===0){
    alert("يرجى اختيار باحث واحد على الأقل");
    return;
  }

  alert(`✅ تم اختيار الباحثين التالية أسماؤهم للشركة:\n\n${selected.join("، ")}`);
}

</script>

</body>
</html>
